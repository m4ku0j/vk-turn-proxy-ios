name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode 16.2
      run: sudo xcode-select -switch /Applications/Xcode_16.2.app

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate .xcodeproj from project.yml
      run: xcodegen generate

    - name: Download vkturn-client binary (placeholder)
      run: |
        mkdir -p VKTurnProxy/Resources
        # Скачиваем arm64 бинарник (для iOS sideload)
        curl -fL -o VKTurnProxy/Resources/vkturn-client \
          https://github.com/cacggghp/vk-turn-proxy/releases/download/v1.1.1/client-android-arm64 \
          || echo "Binary download failed, using placeholder"
        # Placeholder если скачать не удалось
        [ -f VKTurnProxy/Resources/vkturn-client ] || echo "placeholder" > VKTurnProxy/Resources/vkturn-client

    - name: Resolve Swift Package dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -project VKTurnProxy.xcodeproj \
          -scheme VKTurnProxy

    - name: Build (unsigned, simulator check)
      run: |
        xcodebuild build \
          -project VKTurnProxy.xcodeproj \
          -scheme VKTurnProxy \
          -destination "generic/platform=iOS Simulator" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO \
          | xcpretty || true

