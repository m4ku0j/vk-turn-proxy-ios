name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_16.2.app

    - name: Download vkturn-client binary
      run: |
        mkdir -p VKTurnProxy/Resources
        curl -L -o VKTurnProxy/Resources/vkturn-client \
          https://github.com/cacggghp/vk-turn-proxy/releases/download/v1.1.1/client-android-arm64
        chmod +x VKTurnProxy/Resources/vkturn-client

    - name: Resolve SPM dependencies
      run: xcodebuild -resolvePackageDependencies -scheme VKTurnProxy

    - name: Build (unsigned, for simulator check)
      run: |
        xcodebuild build \
          -scheme VKTurnProxy \
          -destination "generic/platform=iOS Simulator" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO \
          | xcpretty || true

